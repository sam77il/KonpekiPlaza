<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./styles/global.css" />
    <link rel="stylesheet" href="./styles/auth.css" />
    <title>Konpeki Plaza - Login</title>
  </head>
  <body>
    <header>
      <div class="header-left">
        <h1><a href="./index.html">Konpeki Plaza</a></h1>

        <ul>
          <li><a href="./marketplace.html">Marketplace</a></li>
          <li><a href="./viktor.html">Viktor</a></li>
          <li><a href="./fingers.html">Fingers</a></li>
          <li><a href="./nusa.html">NUSA</a></li>
        </ul>
      </div>

      <div class="header-right" id="account"></div>
    </header>

    <div class="auth-container">
      <h2>Login</h2>
      <form class="auth-form" id="login-form">
        <div class="auth-row">
          <label for="email">Email:</label>
          <input type="email" id="email" name="email" required />
        </div>
        <div class="auth-row">
          <label for="password">Password:</label>
          <input type="password" id="password" name="password" required />
        </div>
        <button type="submit">Login</button>
        <p class="error-message" id="error-message"></p>
      </form>
    </div>

    <script src="./scripts/global.js"></script>
    <script src="./scripts/login.js"></script>
  </body>
</html>
