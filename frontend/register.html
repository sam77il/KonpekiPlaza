<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./styles/global.css" />
    <link rel="stylesheet" href="./styles/auth.css" />
    <title>Konpeki Plaza - Register</title>
  </head>
  <body>
    <header>
      <div class="header-left">
        <h1><a href="./index.html">Konpeki Plaza</a></h1>

        <ul>
          <li><a href="./marketplace.html">Marketplace</a></li>
          <li><a href="./viktor.html">Viktor</a></li>
          <li><a href="./fingers.html">Fingers</a></li>
          <li><a href="./nusa.html">NUSA</a></li>
        </ul>
      </div>

      <div class="header-right">
        <div class="eurodollar">
          <span id="eurodollar-amount">0</span> <span class="currency">€$</span>
        </div>
        <div id="account"></div>
      </div>
    </header>

    <div class="auth-container">
      <h2>Register</h2>
      <form class="auth-form" id="register-form">
        <div class="auth-row">
          <label for="email">Email:</label>
          <input type="email" id="email" name="email" required />
        </div>
        <div class="auth-row">
          <label for="username">Username:</label>
          <input type="text" id="username" name="username" required />
        </div>
        <div class="auth-row">
          <label for="password">Password:</label>
          <input type="password" id="password" name="password" required />
        </div>
        <div class="auth-row">
          <label for="confirm-password">Confirm Password:</label>
          <input
            type="password"
            id="confirm-password"
            name="confirm-password"
            required
          />
        </div>
        <button type="submit">Register</button>
        <p class="error-message" id="error-message"></p>
      </form>
    </div>

    <script src="./scripts/global.js"></script>
    <script src="./scripts/register.js"></script>
  </body>
</html>
